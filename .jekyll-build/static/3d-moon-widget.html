<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive 3D Moon (2K High-Res)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020202;
            color: #eaeaea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #8ab4f8;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* HUD overlay for dragging guide rings */
        #hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Dashed orbit guide showing the maximum drag boundary of the Sun (1.5x Moon radius) */
        #sun-orbit-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1.5px dashed rgba(255, 204, 0, 0.25);
            border-radius: 50%;
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Draggable Sun Handle with a realistic soft glow */
        #sun-handle {
            position: absolute;
            width: 44px;
            height: 44px;
            background: radial-gradient(circle, #ffffff 15%, #ffcc00 55%, #ff6600 100%);
            border-radius: 50%;
            box-shadow: 0 0 25px #ffcc00, 0 0 50px #ff6600, inset 0 0 5px rgba(255, 255, 255, 0.8);
            cursor: grab;
            z-index: 10;
            touch-action: none; /* Prevents mobile panning/scrolling while dragging */
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #sun-handle:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.15);
        }

        #sun-handle::after {
            content: '☀️';
            font-size: 1.2rem;
            pointer-events: none;
        }

        #control-panel {
            position: absolute;
            top: 80px; /* Places it directly below the toggle button */
            right: 20px; /* Aligns it to the right corner */
            width: 90%;
            max-width: 340px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
            z-index: 20;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            transform: translateY(0);
        }

        #control-panel.hidden {
            transform: translate(0, -20px); /* Slips slightly upwards instead of sinking down */
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 4px;
        }

        .control-group label span {
            color: #8ab4f8;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            background: #333;
            accent-color: #8ab4f8;
            cursor: pointer;
            margin: 0;
        }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 8px;
        }

        /* Styling checkboxes as switches */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #8ab4f8;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        #btn-reset {
            width: 100%;
            background: rgba(138, 180, 248, 0.2);
            border: 1px solid #8ab4f8;
            color: #8ab4f8;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        #btn-reset:active {
            transform: scale(0.97);
        }

        /* Panel Toggle Button */
        #ui-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 44px;
            height: 44px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
    </style>

    <!-- Load stable Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text" style="color: #fff; font-size: 0.9rem;">Baking Mathematical Spherical Blur...</div>
</div>

<div id="ui-toggle" onclick="toggleUI()">❌</div>

<div id="hud-overlay">
    <div id="sun-orbit-guide"></div>
</div>

<div id="sun-handle"></div>

<div id="canvas-container"></div>

<div id="control-panel">
    <h1>3D Moon Explorer</h1>

    <div class="control-group">
        <label for="exaggeration-slider">Topography <span id="exaggeration-val">6.5x</span></label>
        <input type="range" id="exaggeration-slider" min="0.0" max="16.0" step="0.1" value="6.5">
    </div>

    <div class="control-group">
        <label for="smoothness-slider">Topography Smoothness <span id="smoothness-val">0.4</span></label>
        <input type="range" id="smoothness-slider" min="0.0" max="10.0" step="0.1" value="0.4">
    </div>

    <div class="control-group">
        <label for="color-smoothness-slider">Colormap Smoothness <span id="color-smoothness-val">0.5</span></label>
        <input type="range" id="color-smoothness-slider" min="0.0" max="10.0" step="0.1" value="0.5">
    </div>

    <div class="control-group">
        <label for="sun-brightness-slider">Sun Brightness <span id="sun-brightness-val">4.2</span></label>
        <input type="range" id="sun-brightness-slider" min="0.0" max="10.0" step="0.1" value="4.2">
    </div>

    <div class="control-group">
        <label for="sun-distance-slider">Sun Point-Distance <span id="sun-dist-val">10.0x</span></label>
        <input type="range" id="sun-distance-slider" min="1.5" max="50.0" step="0.5" value="10.0">
    </div>

    <div class="control-group">
        <label for="lens-projection-slider">Lens Projection <span id="lens-projection-val">Perspective</span></label>
        <input type="range" id="lens-projection-slider" min="0.0" max="1.0" step="0.05" value="0.0">
    </div>

    <div class="toggle-container">
        <span>Atmospheric Rim Glow</span>
        <label class="switch">
            <input type="checkbox" id="glow-toggle" unchecked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="toggle-container">
        <span>Earthshine (Dark Side Light)</span>
        <label class="switch">
            <input type="checkbox" id="earthshine-toggle" unchecked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="toggle-container">
        <span>Auto-Rotate Moon</span>
        <label class="switch">
            <input type="checkbox" id="rotation-toggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button id="btn-reset" onclick="triggerReset()">Reset Camera & Lights</button>
</div>

<script>
    // Custom Shaders for Cinematic Fresnel Rim Glow
    const fresnelVertexShader = `
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vViewPosition = -mvPosition.xyz;
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fresnelFragmentShader = `
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      uniform vec3 glowColor;
      uniform float coefficient;
      uniform float power;
      uniform float uOpacity;
      void main() {
        vec3 normal = normalize(vNormal);
        vec3 viewDir = normalize(vViewPosition);
        float intensity = pow(clamp(coefficient - dot(normal, viewDir), 0.0, 1.0), power);
        gl_FragColor = vec4(glowColor, intensity * uOpacity);
      }
    `;
</script>

<script>
    let scene, camera, renderer, controls;
    let moon, material, glowMesh, glowMaterial;
    let sunLight, earthshineLight, ambientLight;
    let starfield, starMaterial;

    const moonRadius = 1.0;
    const baseScale = 0.01142;
    const referenceLevel = 0.4565;

    // Interactive Dragging State for Sun
    let isDraggingSun = false;
    let sunPhi = -Math.PI / 4;
    let sunDistNorm = 1.0;
    let targetSunDist = 10.0;
    let targetSunBrightness = 4.2;

    // Smooth resetting state
    let resetting = false;
    let resetTimer = 0.0;

    const sunHandle = document.getElementById('sun-handle');
    const orbitGuide = document.getElementById('sun-orbit-guide');

    // Offscreen Canvases for CPU Geodesic Convolution
    let originalColorImage = null;
    let colorCanvas = document.createElement('canvas');
    let colorCtx = colorCanvas.getContext('2d');
    let colorTexture;
    let origColorData = null;

    let originalHeightImage = null;
    let heightCanvas = document.createElement('canvas');
    let heightCtx = heightCanvas.getContext('2d');
    let heightTexture;
    let origHeightData = null;

    function init() {
        const container = document.getElementById('canvas-container');

        // 1. Create Scene
        scene = new THREE.Scene();

        // 2. Setup Camera
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        setCameraDefaultPosition();

        // 3. WebGLRenderer (optimised for mobile performance)
        renderer = new THREE.WebGLRenderer({antialias: true, powerPreference: "high-performance"});
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Color correction and physical lights
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.35;
        renderer.physicallyCorrectLights = true;

        container.appendChild(renderer.domElement);

        // 4. Camera Controls
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.15;
        controls.maxDistance = 20.0;

        // 5. Lighting
        // Soft ambient light
        ambientLight = new THREE.AmbientLight(0x0e1424, 0.05);
        scene.add(ambientLight);

        // Configure a PointLight for real-world divergent lighting as requested
        sunLight = new THREE.PointLight(0xfffdf2, 4.2, 0, 2);
        scene.add(sunLight);

        // Earthshine (faint blue light reflected from earth on dark side)
        earthshineLight = new THREE.DirectionalLight(0x8ab4f8, 0.35);
        scene.add(earthshineLight);

        let texturesLoaded = 0;

        function checkLoading() {
            texturesLoaded++;
            if (texturesLoaded === 2) {
                // Perform the initial blurs with the new default values
                updateColorTexture();
                updateHeightTexture();

                setupMaterialAndMoon();

                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            }
        }

        // Initialize the offscreen Canvas-based Color Texture with custom loader
        colorTexture = new THREE.CanvasTexture(colorCanvas);
        heightTexture = new THREE.CanvasTexture(heightCanvas);

        // Load Color Map
        const imgColor = new Image();
        imgColor.onload = function () {
            originalColorImage = imgColor;
            colorCanvas.width = imgColor.width;
            colorCanvas.height = imgColor.height;
            colorCtx.drawImage(imgColor, 0, 0);
            origColorData = colorCtx.getImageData(0, 0, colorCanvas.width, colorCanvas.height);
            checkLoading();
        };
        imgColor.src = colorDataUri;

        // Load Height Map
        const imgHeight = new Image();
        imgHeight.onload = function () {
            originalHeightImage = imgHeight;
            heightCanvas.width = imgHeight.width;
            heightCanvas.height = imgHeight.height;
            heightCtx.drawImage(imgHeight, 0, 0);
            origHeightData = heightCtx.getImageData(0, 0, heightCanvas.width, heightCanvas.height);
            checkLoading();
        };
        imgHeight.src = heightDataUri;

        createStarfield();

        // Custom Fresnel Rim Glow Mesh
        const glowGeometry = new THREE.SphereGeometry(moonRadius * 1.015, 64, 64);
        glowMaterial = new THREE.ShaderMaterial({
            vertexShader: fresnelVertexShader,
            fragmentShader: fresnelFragmentShader,
            uniforms: {
                glowColor: {value: new THREE.Color(0xb0c4de)},
                coefficient: {value: 1.0},
                power: {value: 3.5},
                uOpacity: {value: 0.25}
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide
        });
        glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glowMesh);

        setupUI();
        setupDragEvents();
        updateSunSystem();
        window.addEventListener('resize', onWindowResize);

        animate();
    }

    function setupMaterialAndMoon() {
        const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();

        // Set to repeat wrapping to completely eliminate seam-stitching issues
        colorTexture.wrapS = THREE.RepeatWrapping;
        colorTexture.wrapT = THREE.ClampToEdgeWrapping;
        colorTexture.encoding = THREE.sRGBEncoding;
        colorTexture.minFilter = THREE.LinearMipmapLinearFilter;
        colorTexture.magFilter = THREE.LinearFilter;
        colorTexture.anisotropy = Math.min(maxAnisotropy, 4);

        heightTexture.wrapS = THREE.RepeatWrapping;
        heightTexture.wrapT = THREE.ClampToEdgeWrapping;
        heightTexture.minFilter = THREE.LinearMipmapLinearFilter;
        heightTexture.magFilter = THREE.LinearFilter;
        heightTexture.anisotropy = Math.min(maxAnisotropy, 4);

        // 7. Sphere Geometry (using custom polar smoothing algorithm)
        const geometry = new THREE.SphereGeometry(moonRadius, 256, 256);

        material = new THREE.MeshStandardMaterial({
            map: colorTexture,
            roughness: 0.9,
            metalness: 0.0,
            displacementMap: heightTexture,
            bumpMap: heightTexture,
        });

        const initialExaggeration = parseFloat(document.getElementById('exaggeration-slider').value);
        updateTopography(initialExaggeration);

        moon = new THREE.Mesh(geometry, material);
        scene.add(moon);
    }

    // --- TRUE 3D GEODESIC POLAR BLUR (CPU) ---
    // Smooths images exactly as if convolving radially on the final sphere
    function applyGeodesicBlur(canvas, ctx, originalImgData, targetTexture, smoothness) {
        const W = canvas.width;
        const H = canvas.height;

        if (smoothness <= 0.0) {
            ctx.putImageData(originalImgData, 0, 0);
            if (targetTexture) targetTexture.needsUpdate = true;
            return;
        }

        const src = originalImgData.data;
        const dst = new Uint8ClampedArray(src.length);

        // Match slider value to physical equatorial pixels (e.g. 5 = 5 pixels radius at equator)
        const radius_rad = smoothness * (2 * Math.PI / W);
        const var2 = 2 * (radius_rad / 2.0) * (radius_rad / 2.0);
        const cos_R = Math.cos(radius_rad);

        for (let y = 0; y < H; y++) {
            // Build the exact, non-sparse geodesic kernel once per row y
            const kernel = precomputeRowKernel(y, W, H, radius_rad);

            for (let x = 0; x < W; x++) {
                if (kernel.length === 0) {
                    const dest_idx = (y * W + x) * 4;
                    dst[dest_idx] = src[dest_idx];
                    dst[dest_idx + 1] = src[dest_idx + 1];
                    dst[dest_idx + 2] = src[dest_idx + 2];
                    dst[dest_idx + 3] = src[dest_idx + 3];
                    continue;
                }

                let r = 0, g = 0, b = 0, a = 0;
                for (let i = 0; i < kernel.length; i++) {
                    const tap = kernel[i];
                    let nx = x + tap.dx;
                    let ny = y + tap.dy;

                    // Toroidal Mapping to simulate Spherical topology
                    nx = nx % W;
                    if (nx < 0) nx += W;

                    if (ny < 0) {
                        ny = -ny; // Reflect over pole
                        nx = (nx + Math.floor(W / 2)) % W; // Shift to opposite longitude
                    } else if (ny >= H) {
                        ny = 2 * H - 2 - ny;
                        nx = (nx + Math.floor(W / 2)) % W;
                    }
                    ny = Math.max(0, Math.min(ny, H - 1));

                    const idx = (ny * W + nx) * 4;
                    r += src[idx] * tap.weight;
                    g += src[idx + 1] * tap.weight;
                    b += src[idx + 2] * tap.weight;
                    a += src[idx + 3] * tap.weight;
                }
                const dest_idx = (y * W + x) * 4;
                dst[dest_idx] = r;
                dst[dest_idx + 1] = g;
                dst[dest_idx + 2] = b;
                dst[dest_idx + 3] = a;
            }
        }
        ctx.putImageData(new ImageData(dst, W, H), 0, 0);
        if (targetTexture) targetTexture.needsUpdate = true;
    }

    // --- Exact 3D Geodesic Circular Convolution Kernel Generator ---
    function precomputeRowKernel(y, W, H, blur_radius_rad) {
        const phi0 = (Math.PI / 2.0) - (y / (H - 1)) * Math.PI;
        const cos_phi0 = Math.cos(phi0);
        const sin_phi0 = Math.sin(phi0);

        const dy_max = Math.ceil(blur_radius_rad * (H - 1) / Math.PI);
        const y_start = y - dy_max;
        const y_end = y + dy_max;

        const kernel = [];
        const cos_R = Math.cos(blur_radius_rad);
        const sigma = blur_radius_rad / 2.0;
        const var2 = 2 * sigma * sigma;

        for (let ny = y_start; ny <= y_end; ny++) {
            const phi = (Math.PI / 2.0) - (ny / (H - 1)) * Math.PI;
            const cos_phi = Math.cos(phi);
            const sin_phi = Math.sin(phi);

            const denom = cos_phi0 * cos_phi;
            if (Math.abs(denom) < 1e-7) {
                const dist_pole = Math.abs(phi - phi0);
                if (dist_pole <= blur_radius_rad) {
                    const weight = Math.exp(-(dist_pole * dist_pole) / var2);
                    // Sample every single pixel on the row at the pole
                    for (let dx = -Math.floor(W/2); dx < Math.ceil(W/2); dx++) {
                        kernel.push({dy: ny - y, dx: dx, weight: weight});
                    }
                }
                continue;
            }

            const M = (cos_R - sin_phi0 * sin_phi) / denom;

            if (M <= -1.0) {
                // Sample every single pixel on the row
                for (let dx = -Math.floor(W/2); dx < Math.ceil(W/2); dx++) {
                    const theta = (dx / W) * 2 * Math.PI;
                    let cos_d = cos_phi0 * cos_phi * Math.cos(theta) + sin_phi0 * sin_phi;
                    cos_d = Math.max(-1.0, Math.min(1.0, cos_d));
                    const d = Math.acos(cos_d);
                    const weight = Math.exp(-(d * d) / var2);
                    kernel.push({dy: ny - y, dx: dx, weight: weight});
                }
            } else if (M >= 1.0) {
                continue;
            } else {
                const theta_max = Math.acos(M);
                const dx_max = Math.ceil((theta_max / (2 * Math.PI)) * W);
                // Step of exactly 1 for a continuous, non-sparse convolution
                for (let dx = -dx_max; dx <= dx_max; dx++) {
                    const theta = (dx / W) * 2 * Math.PI;
                    let cos_d = cos_phi0 * cos_phi * Math.cos(theta) + sin_phi0 * sin_phi;
                    cos_d = Math.max(-1.0, Math.min(1.0, cos_d));
                    const d = Math.acos(cos_d);
                    if (d <= blur_radius_rad) {
                        const weight = Math.exp(-(d * d) / var2);
                        kernel.push({dy: ny - y, dx: dx, weight: weight});
                    }
                }
            }
        }

        // Normalize
        let total_weight = 0;
        for (let i = 0; i < kernel.length; i++) total_weight += kernel[i].weight;
        if (total_weight > 0) {
            for (let i = 0; i < kernel.length; i++) kernel[i].weight /= total_weight;
        }
        return kernel;
    }

    function createStarfield() {
        const starCount = 2000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);

        for (let i = 0; i < starCount; i++) {
            // Uniform spherical distribution
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = 35 + Math.random() * 15; // Placed at a beautiful depth in space

            starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i * 3 + 2] = r * Math.cos(phi);

            // Random star colors (hot blue, warm yellow, pure white)
            const colorType = Math.random();
            if (colorType < 0.12) {
                starColors[i * 3] = 0.85;
                starColors[i * 3 + 1] = 0.92;
                starColors[i * 3 + 2] = 1.0;
            } else if (colorType < 0.22) {
                starColors[i * 3] = 1.0;
                starColors[i * 3 + 1] = 0.96;
                starColors[i * 3 + 2] = 0.82;
            } else {
                starColors[i * 3] = 1.0;
                starColors[i * 3 + 1] = 1.0;
                starColors[i * 3 + 2] = 1.0;
            }
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        // Circular canvas rendering for stars
        const canvas = document.createElement('canvas');
        canvas.width = 16;
        canvas.height = 16;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
        gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
        gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 16, 16);
        const starTexture = new THREE.CanvasTexture(canvas);

        starMaterial = new THREE.PointsMaterial({
            size: 0.16,
            vertexColors: true,
            transparent: true,
            opacity: 0.85,
            map: starTexture,
            sizeAttenuation: true
        });

        starfield = new THREE.Points(starGeometry, starMaterial);
        scene.add(starfield);
    }

    function setCameraDefaultPosition() {
        // 80% screen fitting algorithm based on current viewport aspect ratio
        const aspect = window.innerWidth / window.innerHeight;
        const fovRad = (camera.fov * Math.PI) / 180;
        const distance = (1.25 * moonRadius) / (Math.tan(fovRad / 2) * Math.min(1.0, aspect));
        camera.position.set(0, 0, distance);
    }

    function updateTopography(exaggeration) {
        if (!material) return;
        const scale = moonRadius * baseScale * exaggeration;
        const bias = -referenceLevel * scale;

        material.displacementScale = scale;
        material.displacementBias = bias;
        material.bumpScale = 0.005 * (exaggeration / 2.0);
    }

    // Mathematical trigonometric screen projection
    function getMoonProjectedRadius() {
        if (!camera) return 50;
        const dist = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
        const angularRadius = Math.asin(Math.min(1.0, moonRadius / dist));
        const fovRad = (camera.fov * Math.PI) / 180;
        const rPx = (window.innerHeight / 2) * (Math.tan(angularRadius) / Math.tan(fovRad / 2));
        return Math.max(20, rPx);
    }

    function updateSunSystem() {
        const rMoonPx = getMoonProjectedRadius();
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        const maxRadiusPx = rMoonPx * 1.5;
        orbitGuide.style.width = `${maxRadiusPx * 2}px`;
        orbitGuide.style.height = `${maxRadiusPx * 2}px`;

        const dragDistancePx = sunDistNorm * rMoonPx;
        const sunScreenX = centerX + Math.cos(sunPhi) * dragDistancePx;
        const sunScreenY = centerY + Math.sin(sunPhi) * dragDistancePx;

        sunHandle.style.left = `${sunScreenX}px`;
        sunHandle.style.top = `${sunScreenY}px`;

        // Non-linear projection to map 2D handle position to 3D sphere coordinate
        const d = sunDistNorm;
        const theta = (Math.PI / 6) * d * d + (Math.PI / 12) * d;

        const lx = Math.cos(sunPhi) * Math.sin(theta);
        const ly = -Math.sin(sunPhi) * Math.sin(theta);
        const lz = Math.cos(theta);

        // Convert camera-space vector to world space via quaternion
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
        const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion);

        const targetPos = new THREE.Vector3()
            .addScaledVector(right, lx * targetSunDist)
            .addScaledVector(up, ly * targetSunDist)
            .addScaledVector(forward, lz * targetSunDist);

        sunLight.position.copy(targetPos);

        // Keep Earthshine light opposite to the sun to always illuminate the dark side
        earthshineLight.position.copy(sunLight.position).negate();

        // --- Inverse Square Normalisation ---
        // Automatically increases PointLight intensity quadratically with distance to
        // keep the subsolar point's received illumination exactly stable at the user's intensity target.
        const distanceToSubsolarPoint = targetSunDist - moonRadius;
        sunLight.intensity = targetSunBrightness * Math.pow(distanceToSubsolarPoint, 2.0);

        const earthshineEnabled = document.getElementById('earthshine-toggle').checked;
        earthshineLight.intensity = earthshineEnabled ? 0.35 : 0.0;
    }

    function setupDragEvents() {
        sunHandle.addEventListener('pointerdown', (e) => {
            isDraggingSun = true;
            controls.enabled = false;
            sunHandle.setPointerCapture(e.pointerId);
            e.preventDefault();
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingSun) return;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const dragDistancePx = Math.sqrt(dx * dx + dy * dy);

            const rMoonPx = getMoonProjectedRadius();
            sunPhi = Math.atan2(dy, dx);
            sunDistNorm = Math.min(dragDistancePx / rMoonPx, 1.5);

            updateSunSystem();
        });

        window.addEventListener('pointerup', (e) => {
            if (isDraggingSun) {
                isDraggingSun = false;
                controls.enabled = true;
                sunHandle.releasePointerCapture(e.pointerId);
            }
        });

        // --- Decoupled Quaternion rotation on Drag ---
        let isDraggingMoon = false;
        let prevPointerPosition = {x: 0, y: 0};

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (isDraggingSun) return;
            isDraggingMoon = true;
            prevPointerPosition = {x: e.clientX, y: e.clientY};
        });

        renderer.domElement.addEventListener('pointermove', (e) => {
            if (!isDraggingMoon || isDraggingSun) return;

            const deltaX = e.clientX - prevPointerPosition.x;
            const deltaY = e.clientY - prevPointerPosition.y;

            // Map drag directions to screen perpendicular axes
            const dragAxisCamera = new THREE.Vector3(deltaY, deltaX, 0).normalize();

            // Transform screen space axis to world space axis
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
            const dragAxisWorld = new THREE.Vector3()
                .addScaledVector(right, dragAxisCamera.x)
                .addScaledVector(up, dragAxisCamera.y)
                .normalize();

            // Rotate moon mesh directly using world space quaternions (completely bypasses gimbal lock)
            const dragDistance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const rotationSpeed = 0.005;
            const deltaRotation = new THREE.Quaternion().setFromAxisAngle(dragAxisWorld, dragDistance * rotationSpeed);

            moon.quaternion.premultiply(deltaRotation);
            glowMesh.quaternion.copy(moon.quaternion); // Keep atmosphere aligned with topography

            prevPointerPosition = {x: e.clientX, y: e.clientY};
        });

        window.addEventListener('pointerup', () => {
            isDraggingMoon = false;
        });
    }

    function showSpinner() {
        const overlay = document.getElementById('loading-overlay');
        document.getElementById('loading-text').innerText = "Baking Mathematical Spherical Blur...";
        overlay.style.display = 'flex';
        overlay.style.opacity = '1';
    }

    function hideSpinner() {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 500);
    }

    function updateColorTexture() {
        if (!originalColorImage) return;
        applyGeodesicBlur(colorCanvas, colorCtx, origColorData, colorTexture, parseFloat(document.getElementById('color-smoothness-slider').value));
    }

    function updateHeightTexture() {
        if (!originalHeightImage) return;
        applyGeodesicBlur(heightCanvas, heightCtx, origHeightData, heightTexture, parseFloat(document.getElementById('smoothness-slider').value));
    }

    function setupUI() {
        const exaggerationSlider = document.getElementById('exaggeration-slider');
        const exaggerationVal = document.getElementById('exaggeration-val');

        exaggerationSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value).toFixed(1);
            exaggerationVal.innerText = val + 'x';
            updateTopography(parseFloat(e.target.value));
        });

        // Update values instantly on drag, execute heavy blur upon release (change)
        const smoothnessSlider = document.getElementById('smoothness-slider');
        const smoothnessVal = document.getElementById('smoothness-val');

        smoothnessSlider.addEventListener('input', (e) => {
            smoothnessVal.innerText = parseFloat(e.target.value).toFixed(1);
        });
        smoothnessSlider.addEventListener('change', (e) => {
            showSpinner();
            setTimeout(() => {
                updateHeightTexture();
                hideSpinner();
            }, 50);
        });

        const colorSmoothnessSlider = document.getElementById('color-smoothness-slider');
        const colorSmoothnessVal = document.getElementById('color-smoothness-val');

        colorSmoothnessSlider.addEventListener('input', (e) => {
            colorSmoothnessVal.innerText = parseFloat(e.target.value).toFixed(1);
        });
        colorSmoothnessSlider.addEventListener('change', (e) => {
            showSpinner();
            setTimeout(() => {
                updateColorTexture();
                hideSpinner();
            }, 50);
        });

        const sunBrightnessSlider = document.getElementById('sun-brightness-slider');
        const sunBrightnessVal = document.getElementById('sun-brightness-val');

        sunBrightnessSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value).toFixed(1);
            sunBrightnessVal.innerText = val;
            targetSunBrightness = parseFloat(e.target.value);
            updateSunSystem();
        });

        const sunDistanceSlider = document.getElementById('sun-distance-slider');
        const sunDistVal = document.getElementById('sun-dist-val');

        sunDistanceSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value).toFixed(1);
            sunDistVal.innerText = val + 'x';
            targetSunDist = parseFloat(e.target.value);
            updateSunSystem();
        });

        const projectionSlider = document.getElementById('lens-projection-slider');
        const projectionVal = document.getElementById('lens-projection-val');

        projectionSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (val === 0) {
                projectionVal.innerText = "Perspective";
            } else if (val === 1) {
                projectionVal.innerText = "Telecentric";
            } else {
                projectionVal.innerText = `Focal Transition (${(100 - val * 100).toFixed(0)}%)`;
            }
            updateCameraProjection(val);
        });
    }

    function updateCameraProjection(blendValue) {
        // Interpolate FOV and camera distance to transform perspective
        const baseFov = 45;
        const targetFov = 2; // Approximates parallel lines (orthographic)
        const currentFov = THREE.MathUtils.lerp(baseFov, targetFov, blendValue);

        camera.fov = currentFov;

        // Keep visual size stable as FOV shrinks
        const aspect = window.innerWidth / window.innerHeight;
        const fovRad = (currentFov * Math.PI) / 180;
        const distance = (1.25 * moonRadius) / (Math.tan(fovRad / 2) * Math.min(1.0, aspect));

        // ADD THIS LINE: Dynamically raise the limit so OrbitControls doesn't snap it forward
        controls.maxDistance = distance * 5.0;

        camera.position.setLength(distance);
        camera.updateProjectionMatrix();
        updateSunSystem();
    }

    function toggleUI() {
        const panel = document.getElementById('control-panel');
        const btn = document.getElementById('ui-toggle');
        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            btn.innerText = '❌'; // Shows "Close" when panel is open
        } else {
            panel.classList.add('hidden');
            btn.innerText = '⚙️'; // Shows "Gear" when panel is closed
        }
    }

    function triggerReset() {
        resetting = true;
        resetTimer = 0.0;

        document.getElementById('color-smoothness-slider').value = 0.5;
        document.getElementById('color-smoothness-val').innerText = "0.5";
        updateColorTexture();

        document.getElementById('smoothness-slider').value = 0.4;
        document.getElementById('smoothness-val').innerText = "0.4";
        updateHeightTexture();
    }

    function handleResetStep() {
        if (!resetting) return;

        resetTimer += 0.03;
        if (resetTimer >= 1.0) {
            resetting = false;
            setCameraDefaultPosition();
            camera.fov = 45;
            camera.updateProjectionMatrix();
            document.getElementById('lens-projection-slider').value = 0;
            document.getElementById('lens-projection-val').innerText = "Perspective";
            sunPhi = -Math.PI / 4;
            sunDistNorm = 1.0;
            targetSunDist = 10.0;
            document.getElementById('sun-distance-slider').value = 10.0;
            document.getElementById('sun-dist-val').innerText = "10.0x";

            targetSunBrightness = 4.2;
            document.getElementById('sun-brightness-slider').value = 4.2;
            document.getElementById('sun-brightness-val').innerText = "4.2";

            document.getElementById('smoothness-slider').value = 0.4;
            document.getElementById('smoothness-val').innerText = "0.4";
            updateHeightTexture();

            document.getElementById('color-smoothness-slider').value = 0.5;
            document.getElementById('color-smoothness-val').innerText = "0.5";
            updateColorTexture();

            moon.quaternion.set(0, 0, 0, 1);
            glowMesh.quaternion.set(0, 0, 0, 1);
            updateSunSystem();
            return;
        }

        // Smooth lerp transformations
        const aspect = window.innerWidth / window.innerHeight;
        const fovRad = (45 * Math.PI) / 180;
        const targetCampPos = (1.25 * moonRadius) / (Math.tan(fovRad / 2) * Math.min(1.0, aspect));
        const targetCamPos = new THREE.Vector3(0, 0, targetCampPos);

        camera.position.lerp(targetCamPos, 0.08);
        camera.fov = THREE.MathUtils.lerp(camera.fov, 45, 0.08);
        camera.updateProjectionMatrix();

        controls.target.set(0, 0, 0);
        moon.quaternion.slerp(new THREE.Quaternion(0, 0, 0, 1), 0.08);
        glowMesh.quaternion.copy(moon.quaternion);

        sunPhi = THREE.MathUtils.lerp(sunPhi, -Math.PI / 4, 0.08);
        sunDistNorm = THREE.MathUtils.lerp(sunDistNorm, 1.0, 0.08);
        targetSunDist = THREE.MathUtils.lerp(targetSunDist, 10.0, 0.08);
        targetSunBrightness = THREE.MathUtils.lerp(targetSunBrightness, 4.2, 0.08);

        updateSunSystem();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        updateSunSystem();
    }

    function animate() {
        requestAnimationFrame(animate);

        // Perform reset operations if triggered
        if (resetting) {
            handleResetStep();
        }

        const rotateChecked = document.getElementById('rotation-toggle').checked;
        if (moon && rotateChecked && !resetting && !isDraggingSun) {
            moon.rotation.y += 0.0008;
            glowMesh.rotation.y = moon.rotation.y;
        }

        // Starfield twinkle and slowly spin
        if (starfield && starMaterial) {
            starfield.rotation.y += 0.0001;
            starMaterial.size = 0.12 + 0.04 * Math.sin(Date.now() * 0.0018);
        }

        // Dynamic Fresnel glow visibility setting
        const glowEnabled = document.getElementById('glow-toggle').checked;
        if (glowMaterial) {
            glowMaterial.uniforms.uOpacity.value = glowEnabled ? 0.35 : 0.0;
        }

        controls.update();

        // Update coordinates
        updateSunSystem();

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
