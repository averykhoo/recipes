<script>
    (function () {
        /* Guard against multiple executions when include is rendered twice */
        if (window.themeToggleInitialized) return;
        window.themeToggleInitialized = true;

        /* Scoped timeouts to prevent overlapping events from rapid clicking */
        let themeTimeout;
        let transitionTimeout;

        /* Sync checkbox inputs and dial bezel animation classes */
        const syncAllToggles = (isDark, animate = true) => {
            const checkboxes = document.querySelectorAll('.theme-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = isDark;
                const slider = cb.nextElementSibling;
                if (slider && slider.classList.contains('slider-b')) {
                    if (isDark) {
                        slider.classList.add('dark-bezel');
                    } else {
                        slider.classList.remove('dark-bezel');
                    }
                    if (animate) {
                        if (isDark) {
                            slider.classList.remove('animate-to-light');
                            slider.classList.add('animate-to-dark');
                        } else {
                            slider.classList.remove('animate-to-dark');
                            slider.classList.add('animate-to-light');
                        }
                    }
                }
            });
        };

        const initializeToggleLogic = () => {
            let activeTheme;
            try {
                activeTheme = localStorage.getItem('theme');
                if (!activeTheme) {
                    activeTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
            } catch (err) {
                activeTheme = 'light';
            }

            /* Sync checkbox status on load without animations */
            const isDark = activeTheme === 'dark';
            syncAllToggles(isDark, false);

            /* Remove the transition hold block after initial paint settles to allow future animations */
            setTimeout(() => {
                document.querySelectorAll('.slider-b').forEach(slider => {
                    slider.classList.remove('hold-transition');
                });
            }, 50);

            /* Apply initial theme values */
            if (typeof jtd !== 'undefined') {
                jtd.setTheme(activeTheme);
            } else {
                document.documentElement.setAttribute('data-theme', activeTheme);
                const links = document.querySelectorAll('link[rel="stylesheet"]');
                for (let link of links) {
                    if (link.href && link.href.includes('just-the-docs-') && !link.href.includes('head-nav')) {
                        link.href = link.href.replace(/just-the-docs-(default|light|dark)\.css/, `just-the-docs-${activeTheme}.css`);
                        break;
                    }
                }
            }

            /* Bind change event handlers */
            const checkboxes = document.querySelectorAll('.theme-checkbox');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', (e) => {
                    /* Clear any pending timeouts from rapid clicking to prevent race conditions */
                    clearTimeout(themeTimeout);
                    clearTimeout(transitionTimeout);

                    /* 1. Immediately activate transitional smoothing class on html */
                    document.documentElement.classList.add('theme-transition');

                    const targetState = e.target.checked;
                    const nextTheme = targetState ? 'dark' : 'light';

                    /* 2. Instantly animate the physical rotation of the toggles */
                    syncAllToggles(targetState, true);

                    /* --- START TRANSITION TIMING CORRECTION PATCH --- */
                    const startTime = performance.now();
                    const targets = document.querySelectorAll('h1, h2, h3, h4, h5, h6, .nav-list-link.active, .nav-list-item.active > .nav-list-link');

                    /* Lock all targeted elements to their current computed colors */
                    const saved = [];
                    targets.forEach(el => {
                        const current = window.getComputedStyle(el).color;
                        saved.push({ el, startColor: current });
                        el.style.color = current;
                    });

                    let triggered = false;
                    const triggerStaticTransitions = () => {
                        if (triggered) return;
                        triggered = true;

                        const elapsed = Math.round(performance.now() - startTime);

                        /* Calculate remaining transition window dynamically to sync animations */
                        const remaining = Math.max(100, 1200 - elapsed);

                        saved.forEach(({ el, startColor }) => {
                            /* Disable transitions temporarily to measure JTD's new static stylesheet color */
                            el.style.setProperty('transition', 'none', 'important');
                            el.style.color = '';

                            const targetColor = window.getComputedStyle(el).color;

                            /* Restore starting color and remove temporary transition bypass override */
                            el.style.color = startColor;
                            el.style.removeProperty('transition');

                            /* Force layout reflow so the browser registers the baseline start color */
                            el.offsetHeight;

                            /* Force the transition over the exact remaining window with static target color */
                            el.style.setProperty('transition', `color ${remaining}ms cubic-bezier(0.4, 0.0, 0.2, 1)`, 'important');
                            el.style.color = targetColor;

                            /* Cleanup inline custom properties at the exact end of the transition */
                            setTimeout(() => {
                                el.style.color = '';
                                el.style.removeProperty('transition');
                            }, remaining);
                        });

                        /* Safely strip class at the exact millisecond all transitions finish */
                        transitionTimeout = setTimeout(() => {
                            document.documentElement.classList.remove('theme-transition');
                        }, remaining);
                    };

                    /* Listen to document.body's native transitionrun to capture perfect stylesheet loading moment */
                    const onStyleLoad = (evt) => {
                        if (evt.target === document.body && (evt.propertyName === 'color' || evt.propertyName === 'background-color')) {
                            document.body.removeEventListener('transitionrun', onStyleLoad);
                            triggerStaticTransitions();
                        }
                    };
                    document.body.addEventListener('transitionrun', onStyleLoad);

                    /* Defensive fallback timeout (350ms) in case stylesheet load event is skipped */
                    themeTimeout = setTimeout(() => {
                        document.body.removeEventListener('transitionrun', onStyleLoad);
                        triggerStaticTransitions();
                    }, 350);
                    /* --- END TRANSITION PATCH --- */

                    /* 3. Swap theme variables immediately (at 0s) to start the fade simultaneously */
                    if (typeof jtd !== 'undefined') {
                        jtd.setTheme(nextTheme);
                    } else {
                        document.documentElement.setAttribute('data-theme', nextTheme);

                        /* DO NOT TRIGGER A NETWORK REQUEST HERE. The FOUC flash happens when you
                           swap <link href="..."> over the network mid-animation. Only do it if jtd is totally broken. */
                        const links = document.querySelectorAll('link[rel="stylesheet"]');
                        for (let link of links) {
                            if (link.href && link.href.includes('just-the-docs-') && !link.href.includes('head-nav')) {
                                link.href = link.href.replace(/just-the-docs-(default|light|dark)\.css/, `just-the-docs-${nextTheme}.css`);
                                break;
                            }
                        }
                    }

                    try {
                        localStorage.setItem('theme', nextTheme);
                    } catch (err) {
                        console.warn('Could not save theme selection:', err);
                    }

                    /* 4. Clean up transitional class after entire visual rotation completes (1200ms) *
                    transitionTimeout = setTimeout(() => {
                        document.documentElement.classList.remove('theme-transition');
                    }, 1200); */
                });
            });
        };

        /* Run initialization once DOM elements are ready */
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initializeToggleLogic);
        } else {
            initializeToggleLogic();
        }
    })();
</script>
