<div id="cache-status-container" style="padding: 10px; font-size: 0.85em; border-top: 1px solid #eee; margin-top: 10px;">
  <div id="cache-status-info" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;">
    <span id="cache-status-text">Checking for updates...</span>
    <span id="cache-status-icon">🔄</span>
  </div>
  <div id="cache-progress-bar-container" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" style="width: 100%; height: 4px; background-color: #eee; border-radius: 2px; overflow: hidden; display: none;">
    <div id="cache-progress-bar" style="width: 0%; height: 100%; background-color: #2c84fa; transition: width 0.3s ease;"></div>
  </div>
</div>

<script>
  (function() {
    const statusText = document.getElementById('cache-status-text');
    const statusIcon = document.getElementById('cache-status-icon');
    const progressContainer = document.getElementById('cache-progress-bar-container');
    const progressBar = document.getElementById('cache-progress-bar');

    let isOffline = !navigator.onLine;
    let lastStatus = 'checking';
    let lastProgress = 0;
    let lastTotal = 0;
    let lastFails = 0;

    function updateUI(status, progress, total, fails) {
      if (status !== undefined) lastStatus = status;
      if (progress !== undefined) {
        if (progress > lastProgress || progress === 0) {
          lastProgress = progress;
        }
      }
      if (total !== undefined) lastTotal = total;
      if (fails !== undefined) lastFails = fails;

      if (isOffline) {
        if (lastStatus === 'ready' && lastFails > 0) {
          statusText.innerText = 'Offline (Partial Cache)';
          statusIcon.innerText = '⚠️';
        } else {
          statusText.innerText = 'Working Offline';
          statusIcon.innerText = '📡';
        }
        progressContainer.style.display = 'none';
        return;
      }

      switch (lastStatus) {
        case 'loading':
          statusText.innerText = 'Loading cache...';
          statusIcon.innerText = '⏳';
          progressContainer.style.display = 'block';
          if (lastTotal > 0) {
            const percent = Math.round((lastProgress / lastTotal) * 100);
            progressBar.style.width = percent + '%';
            progressContainer.setAttribute('aria-valuenow', percent);
          }
          break;
        case 'ready':
          if (lastFails > 0) {
            statusText.innerText = 'Cache ready (with warnings)';
            statusIcon.innerText = '⚠️';
          } else {
            statusText.innerText = 'Offline ready';
            statusIcon.innerText = '✅';
          }
          progressContainer.style.display = 'none';
          break;
        case 'checking':
          statusText.innerText = 'Checking for updates...';
          statusIcon.innerText = '🔄';
          progressContainer.style.display = 'none';
          break;
      }
    }

    function requestStatus() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.ready.then(registration => {
          const worker = registration.installing || registration.waiting || registration.active;
          if (worker) {
            worker.postMessage({ type: 'GET_STATUS' });
          }
        });
      }
    }

    // Listen for messages from Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data && event.data.type === 'CACHE_STATUS') {
          updateUI(event.data.status, event.data.progress, event.data.total, event.data.fails);
        }
      });

      // Request initial status when SW is ready
      requestStatus();
    }

    // Listen for online/offline events
    window.addEventListener('online', () => {
      isOffline = false;
      requestStatus();
    });

    window.addEventListener('offline', () => {
      isOffline = true;
      updateUI();
    });

    // Initial UI state
    if (isOffline) {
      updateUI();
    }
  })();
</script>
